body:
  text: 搜玉小集總集類提要臣等謹案搜玉小集一巻原本不著撰人名氏考鄭樵通志藝文畧已載之則其來甚舊當為唐人所輯無疑舊目題凡三十七人詩六十三首此本但三十四人詩六十一首蓋毛晉重刋所釐定所註考証頗詳然胡鵠等三人有録無詩晉併刪其姓名已非缺疑存舊之意又人缺其三而詩僅缺其二不足分配三人必有一人之詩溷于他人者則所訂亦未確也其次第為晉所亂不可復考既不以人叙又不以體分編次參差重出叠見莫能得其體例徒以源出唐人聊存舊本以備參訂焉乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e896e5e462fac6e46420e27c4d3974ddfa6e01bd669fa17e1c97ee8a10acd6b0
