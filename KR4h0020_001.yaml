body:
  text: 搜玉小集奉和御製白鹿觀或作鄭愔崔湜御旗探紫籙仙仗闢丹丘捧藥芝童下焚香桂女留鸞歌無嵗月鶴語記春秋臣朔何其幸常陪漢武遊奉和御製平胡裴漼𤣥漠聖恩通由來書軌同忽聞窺月滿相聚冦雲中廟略占黃氣神兵出絳宮將軍行逐虜使者亦和戎一舉轒輼滅再麾沙朔空直將威禁暴非用武為雄飲至明軍禮酬勳錫武功干戈還載戢文德在唐風同前韓休南牧正紛紛長河起塞氛玉兵徵選士金鉞拜將軍疉鼓搖邊吹連旌暗朔雲妖星乘夜落害氣入朝分始見幽烽警俄看烈火焚功成奏凱樂戰罷策歸勳盛德陳清廟神謨屬大君叨榮逢偃羽率舞詠時文西征軍行遇風崔融北風捲塵沙左右不相識颯颯吹萬里昏昏同一色馬煩莫敢進人急未遑食草木春更悲天景晝相匿夙齡慕忠義雅尚存孤直覽史懷浸驕讀詩歎孔棘及兹戎旅地忝從書記職兵氣騰北荒軍聲振西極坐覺威靈逺行看祲氛息愚臣何以報倚馬申微力塞垣行崔湜疾風捲溟海萬里揚沙礫仰望不見天昏昏竟朝夕是時軍兩進東拒復西敵蔽山張旗鼓間道潛鋒鏑精騎突曉圍竒兵襲暗壁十月邊塞寒四山沍隂積雨雪雁南飛風塵景西迫昔我事討論未嘗怠經籍一朝棄筆硯十年操矛㦸豈要黃河誓須勒燕然石可嗟牧羊臣海上久為客大漠行前人單于犯薊堧驃騎略蕭邊南山木葉飛下地北海蓬根亂上天科斗連營太原道魚麗合陳武威川三軍遙倚伏萬里相馳逐旌斾悠悠靜瀚源鼙鼓喧喧動盧谷窮徼出幽陵吁嗟倦寢興馬蹄凍溜石胡毳暖生氷雲沙泱漭天光閉河塞隂沈海色凝崆峒異國誰能託蕭索邊心常不樂近見行人畏白龍遙聞公主愁黃鶴陽春半岐路間瑶臺苑玉門關百花芳樹紅將歇二月蘭皋緑未還陳雲不散魚龍水雨雪猶飛鴻雁山山障連綿不可極路逺辛勤夢顔色北堂萱草不寄來東園桃李長相憶漢將紛紜攻戰盈胡冦蕭條幽朔寧韓君拜節偏知逺鄭吉驅旌坐見迎火絶煙沈右西極谷靜山空左北平但使將軍能百戰不須天子築長城將軍行劉希夷將軍闢轅門耿介當風立諸將欲言事逡巡不敢入劍氣射雲天鼓聲破原隰黃塵塞路起走馬追兵急彎弓從此去飛箭如雨集截圍一百重斬首五千級代馬流血死殘兵抱鞍泣古來養甲兵有事常討襲乘我廟堂運坐使干戈戢獻凱還帝亰軍容何翕習從軍行賀朝朔胡乘月寇邊城軍書插羽刺中亰天子金壇拜飛將單于玉塞振佳兵騎射先鳴推任俠龍韜决勝佇時英聞有河湟客愔愔理帷帟常山啓霸圖汜水先天策銜珠浴鐵向桑乾釁旗膏鼓指烏丸鳴雞已報關山曉來雁遙傳沙塞寒直為寸心從苦節隴頭無水長嗚咽邊樹蕭蕭不覺春天山漠漠長飛雪魚麗陳接塞雲平雁翼營通海月明始看晉幕飛鵝入旋聞齊壘啼烏聲自從一戍燕支山春光幾度晉陽關金河未轉青絲騎玉筯應啼紅粉顔鴻歸燕相逐池邊芳草緑已見氛清細柳營莫更春歌落梅曲烽沈竈減靜邉亭海晏山空肅已寧行望鳳亰旋凱捷重來麟閣畫丹青燕歌行已見國秀集異同注明屈同漁陽八月塞草腓征人相對併思歸雲和朔氣連天暗蓬雜驚沙散野飛此時天地隂埃遍瀚海龍城皆血戰兩軍鼓角暗相聞四面旌旗看不見昭君逺嫁已年多南使頻來尚不和漢兵候月秋防塞朔騎乘氷夜渡河河塞東西萬餘里地與亰華不相似燕支山上少光輝黃沙磧裡無流水金戈玉劒十年征紅粉青樓多怨情厭得殊方久為别秋來但聽搗衣聲塞外鄭愔荒壘三秋夕窮郊萬里平海隂凝獨樹日氣下連營戎斾霜疑重邊裘寒更輕將軍猶轉戰都尉不成名折柳悲春曲吹笳斷夜聲明年漢使返須築受降城紫騮楊炯俠客重周遊金鞭控紫騮蛇弓白羽箭鶴轡赤茸鞦發跡來南海長鳴向北州胸奴今未滅畫地取封侯詠寶劒向誤宋之問崔融寶斂出昆吾龜龍夾彩珠五精初獻術千戶競淪都匣氣衝牛斗山形轉轆轤欲知天下貴持此問風胡王昭君盧照鄰合殿恩中絶交河使漸稀肝腸隨玉輦形影向金微漢宮草應緑邊庭沙正飛願逐三秋雁年年一度歸同前東方虬漢道方全盛朝廷足武臣何須薄命妾辛苦事和親同前郭元振聞有南河信傳言殺畫師始知君念重更肯惜蛾眉晚度天山有懷亰邑駱賔王忽上天山望依然想物華雲疑上苑葉雪似御溝花行歎戎麾逺坐令衣帶賒交河浮絶塞弱水浸流沙旅思徒漂梗歸期未及瓜寧知心斷絶夜夜泣胡笳送公主和戎徐彥伯鳳扆憐簫曲鸞帷念掌珍虜庭遙築館漢使逺和親星去銀河夕花移玉樹春聖情淒割愛駐蹕望征塵古意向誤崔湜崔皓十五嫁王昌盈盈出畫堂自矜年正少復倚壻為郎舞愛前溪緑歌憐午夜長門時鬬百草度日不成粧酬杜麟臺春思崔湜春還上林苑花滿洛陽城鴛衾夜凝思龍鏡曉含情憶夢殘燈落離魂暗馬驚可憐朝與暮樓上獨盈盈春閨徐彥伯戍客戍清波幽閨幽思多暗梁聞語燕夜燭見飛蛾寶匣藏脂粉金屏綴綺羅裁衣卷紋素織錦度鳴梭有使通西極緘書寄北河年光只恐盡征戰莫蹉跎怨情劉允濟玉關芳信斷蘭閨錦字新愁來不自抑念切已含嚬虗牖風驚夢空床月厭人歸期倘可促勿度柳園春春怨鄭愔春朝物候妍愁婦鏡臺前風吹數蝶亂露洗百花鮮試出褰羅幌還來著錦筵曲中愁夜夜樓上别年年不及隨蕭史髙飛向紫煙春閨沈佺期汗馬三軍去流鶯二月還邊愁行上國春夢度陽關池水琉璃淨園花玳瑁斑嵗華空自擲憂思不勝顏秋閨鄭愔征客向輪臺幽閨寂不開音書秋雁斷機杼夜蛩催虗幌風吹葉間階露濕苔自憐愁思影共作月徘徊古意沈佺期盧家少婦鬱金堂海燕雙棲玳瑁梁九月寒砧催木葉十年征戍憶遼陽白狼河北音書斷丹鳳城南秋夜長誰為含愁獨不見更教明月照流黃閨怨國秀集作孤獨歎徐彥伯切切夜閨冷微微孤燭燃玉盤紅淚滴金燼彩光圓暖手縫輕素嚬蛾續斷絃相思咽不語回向錦屏眠怨辭向誤張炫或刻張紘張汯去年離别雁初歸今日裁縫螢已飛征客未來音信斷不知何處寄邊衣秋閨喬知之南庭結白露北風掃黃葉此時鴻雁來驚鳴催思妾曲房理針線平砧搗紋練鴛綺裁已成龍鄉信難見窈窕九重閨寂寞十年啼紗忩白雲宿羅幌月光栖雲月隱微微夜上流黃機玉霜凍珠履金吹薄羅衣漢家已得地君去將何事宛轉結蠶書寂寥無雁使平生荷恩信本為容華進况復落紅顔蟬聲催白鬢搗衣篇劉希夷秋天瑟瑟夜漫漫夜白風清玉露漙燕山逰子衣裳薄秦地佳人閨閣寒欲向樓中縈楚練還來機上裂齊紈攬紅袖兮愁徙倚盼青砧兮悵盤桓盤桓徙倚夜已久螢火雙飛入簾牖西北風來吹細腰東南月映浮纎手此時秋月可憐明此時秋風别有情君看月下參差影為聽莎間斷續聲絳河轉兮青雲曉飛鳥鳴兮行人少攢眉緝縷思紛紛對影穿針魂悄悄聞道還家未有期誰憐登隴不勝悲夢見形容亦舊日為許裁縫改昔時緘書逺寄交河曲須及明年春草緑莫嫌衣上有斑斑只為思君淚相績題河邊枯柳王泠然隋家天子憶揚州厭坐深宮傍海陬穿地鑿山開御路鳴笳疊鼓泛春流流從鞏北河分口直到淮南種官柳功成力盡人旋亡運謝年移樹空有當時綵女侍君王帳殿旌門對柳行青葉交垂連幔色白花飛散染衣香今日摧殘何用道數里曾無一株好驛騎江帆損更多山精野鬼藏應老深秋九月露為霜日夜孤舟入帝鄉河畔時時聞落葉客中無箇不霑裳折柳篇許景先春色東來渡灞橋青門垂柳百千條垂柳西連建章路漢家禁苑紛無數縈花始遍合歡枝逰絲半罥相思樹秦樓初日照南隅柔條垂緑映金鋪寶叉新梳􅠄鬢髻錦帶交垂連理襦自憐柳塞淹戎幕銀燭長啼愁夢著芳樹朝催玉管新春風夜染羅衣薄城頭楊柳已如絲令年花落去年時折芳逺寄相思曲為惜容華難再持長信宮樹喬知之阿娜當軒樹䒠茸倚蘭殿葉映九春華香搖五眀扇餘花鳥哢盡新葉蟲書遍零落容自知芬芳君不見同蔡孚五亭詠徐晶章奏中亰罷雲容别業歸拂琴鋪野席牽柳挂朝衣翡翠巢書幌鴛鴦立釣磯幽栖可憐處春事滿林扉阮公體前人秦王按劒怒發卒戍龍沙雄圖尚未畢海內已紛拏黃塵暗天起白日斂精華唯見長城外僵尸如亂麻贈蘇管記杜審言北地寒應苦南庭戍不歸邊聲亂羌笛朔氣卷戎衣雨雪關山暗風霜草木稀朔兵戰欲盡虜騎獵猶肥雁塞何時入龍城幾度圍據鞍雄劍動搖筆羽書飛輿駕還亰邑朋逰滿帝畿方期乘獻凱歌舞共春暉溫泉莊卧疾寄楊七炯宋之問移疾臥兹嶺寥寥倦幽獨賴有嵩髙山髙枕長在目兹山棲靈異朝夕翳雲族是日濛雨晴反景入巖谷羃羃澗畔草青青山下木此意方無窮環顧悵林麓伊洛何悠漫川原信重復夏餘鳥獸蕃秋末禾黍熟秉願守樊圃歸閒欣藝牧惜無載酒人徒把涼潭菊述懷魏徵中原初逐鹿投筆事戎軒縱橫計不就慷慨志猶存杖䇿謁天子驅馬出關門請纓繫南越憑軾下東藩鬱紆陟髙岫出沒望平原古木吟寒雁空山啼夜猿既傷千里目還驚九死魂豈不憚艱險深懷國士恩季布無二諾侯嬴重一言人生感意氣功名誰復論暮秋言懷上二首向誤宋之問前人首夏别亰輔杪秋滯三河沈沈蓬萊閣日久鄉思多霜翦涼地蕙風捎幽渚荷嵗芳坐淪歇感此式微歌白帝懷古向誤宋之問陳子昂日落滄江晚停橈問土風城臨巴子國臺沒漢王宮荒服仍周甸深山尚禹功巖懸青壁斷地險碧流通古木生雲際歸帆出霧中川途去無限客思坐何窮書懷劉幽求心為明時盡君門尚不容田園迷徑路歸去路何從桂陽三日述懷宋之問代業亰華裏逺投魑魅鄉登髙望不極雲海四茫茫伊昔乘休眄常為人所羡兩朝賜顔色二紀陪歡宴昆明宿昔侍龍媒伊闕天泉復幾回西夏黃河水心劒東周清洛羽觴杯苑中落花掃還合河畔垂楊撥不開千春萬夀多行樂柏梁和歌攀睿作賜金分帛奉恩輝風舉雲搖入紫微晨趨北闕朝天去夜出南宮把燭歸載筆儒林多歲月襆被文昌事吳越越中山海髙且深興來無處不登臨永和九年佐海郡暮春三月醉山隂愚謂嬉逰長似昔不言流寓歘成今始安繁華舊風俗帳飲傾城沸江曲主人管絃清且悲客子肝腸斷還續荔浦蘅臯萬里餘洛陽音信絶能疏故園今日應愁思曲水何能更祓除逐伴誰憐合浦葉思歸豈食桂江魚不求漢使金囊贈願得佳人錦字書九日升髙王勃九月九日望鄉臺他席他鄉送客杯人今已厭南中苦鴻雁那從北地來觀燈蘇味道火樹銀花合星橋鐡鎖開暗塵隨馬去明月逐人來逰妓皆穠李行歌盡落梅金吾不禁夜玉漏莫相催夜逰沈佺期今夕重門啓逰春得夜芳月華連晝色燈影雜星光南陌青絲騎東鄰紅粉粧管絃遙辨曲羅綺暗聞香人擁行歌路車攢鬭舞場經過猶未已鐘鼓出長楊觀燈王諲暫得金吾夜通看火樹春停車傍明月走馬入紅塵妓雜歌偏勝場移舞更新應須盡記取說向不來人夜光篇王泠然逰人夜到汝陽間夜色冥濛不解顏誰家暗起寒山燒因此明中得見山山頭山下須臾滿歷險緣深無暫斷焦聲散著羣樹鳴炎氣傍臨一川暖是時西北多海風吹上連天光更雄濁煙熏月黑髙熖爇雲紅初謂鍊丹仙竈裏還疑鑄劒神溪中劃為飛電來照物乍作流星併上空西山無草光已滅東頂熒熒猶未絶沸湯空谷數道水融蓋隂崖幾年雪兩亰貧病若為居四壁皆成鑿照餘未得貴遊同秉燭唯將半景借披書催粧徐璧傳聞燭下調紅粉明鏡臺前别作春不須滿面渾粧却留著雙睂待畫人翦綵沈佺期宮女憐芳樹栽花競早榮寒依刀尺盡春向綺羅生弱蒂盤絲發香蕤結素成纎枝幸不棄長就玉階傾人日剪綵余延夀閨婦持刀坐自憐裁翦新葉催情綴色花寄手成春帖燕留粧戶黏雞待餉人擎來問夫壻何處不如真三日岐王宅張諤玉女貴妃生嫕婗始發聲金盆浴未了綳子繡初成翡翠雕芳褥真珠帖小纓何時學健步鬬取落花輕滿月前人社金流茂祉庭玉表竒才竹似因談植蘭疑入夢栽烏將八子去鳳逐九雛來今夜明珠色當隨滿月開太平公主山亭侍宴應制李嶠黃金瑞榜絳河隈白玉仙輿紫禁來碧樹青岑雲外聳朱樓畫閣水中開龍舟下瞰鮫人室羽節髙臨鳳女臺遽惜歡娛歌吹晚揮戈更却曜靈回岐王席上詠美人張諤半額畫雙蛾盈盈燭下歌玉杯寒意少金屋夜情多香豔王分帖裙嬌勑賜羅平陽莫相妬喚出不如他汾隂行李嶠君不見昔日西亰全盛時汾隂后土親祭祠齊宮宿寢設儲供撞鐘鳴鼓樹羽旗漢家四葉才且雄賓延萬靈服九戎柏梁賦詩髙宴罷詔書法駕幸河東河東太守親掃除奉迎至尊導鑾輿五營夾道列容衛三河縱觀空里閭回旌駐蹕降靈場懷椒奠桂邀百祥金鼎發色正焜煌明祗曄曄摛景光埋玉陳牲禮神畢舉麾上帝乘輿出彼汾之曲佳可遊木蘭為楫桂為舟棹歌微吟彩鷁浮簫鼓哀鳴白雲秋歡娛宴賜洽羣后家家復除戶牛酒聲明動天樂無有千秋萬嵗南山夀自從天子向南關玉輦金車不復還珠簾翠羽長寂寞鼎湖龍髯何處攀千年人事一朝空四海為家此路窮雄豪意氣今何在壇場宮觀盡蒿蓬道傍古老長歎息世事回環不可識昔時青樓對歌舞令日黃埃聚荆棘山川滿目淚霑衣富貴榮華能幾時不見即今汾上水唯有年年秋雁飛代白頭吟或刻宋之問集劉希夷洛陽城東桃李花飛來飛去落誰家洛陽女兒惜顏色行逢落花長歎息今年花落顔色改明年花開復誰在已見松柏摧為薪更聞桑田變成海古人無復洛城東今人還對落花風年年嵗嵗花相似嵗嵗年年人不同寄言全盛紅顏子須憐半死白頭翁此翁白頭真可憐伊昔紅顔美少年公子王孫芳樹下清歌妙舞落花前光祿池臺文錦繡將軍樓閣畫神仙一朝臥病無知已三春行樂在誰邊宛轉蛾睂能幾時須臾鶴髮亂如絲但看古來歌舞處唯有黃昏鳥雀悲明河篇宋之問八月涼風天氣晶萬里無雲河漢明昏見南樓清且淺曉落西山縱復橫洛陽城闕天中起長河夜夜千門裏復道連甍共蔽虧畫堂瓊户特相宜雲母帳前初泛濫水精簾外轉逶迤倬彼昭回如練白復出東城接南陌南陌征人去不歸誰家今夜搗寒衣鴛鴦機上疏螢度烏鵲橋邊一雁飛雁飛螢度愁難歇坐見天河傾漸沒已能舒卷任浮雲不惜光輝讓流月明河可望不可親願得乘槎一問津更將織女支機石還訪成都賣卜人韋長史挽歌崔融日暮桑榆下寒生松柏中冥冥多苦霧切切有悲風亰兆新阡合扶陽甲第空郭門從此去荆棘漸蒙籠度大庾嶺宋之問度嶺方辭國停軺一望家魂隨南翥鳥淚盡北枝花山雨初含霽江雲欲變霞但令歸有日不敢恨長沙過蠻洞前人越嶺千重合蠻溪十里斜竹迷樵子徑萍匝釣人家林暗交楓葉園香覆橘花誰憐荒外孤賞足雲霞登越王臺前人江上越王臺登高望幾回南溟天外合北户日邊開地濕煙常起山晴雨半來冬花掃盧橘夏果摘楊梅跡類虞翻枉人非賈誼才歸心不可度白髮重相催搜玉小集
