body:
  text: 搜玉小集總集類提要臣等謹案搜玉小集一卷原本不著撰人名氏考鄭樵通志藝文略已載之則其來甚舊當為唐人所輯無疑舊目題凡三十七人詩六十三首此本但三十四人詩六十一首蓋毛晉重刋所釐定所注考證頗詳然胡鵠等三人有録無詩晉併刪其姓名已非缺疑存舊之意又人缺其三而詩僅缺其二不足分配三人必有一人之詩溷于他人者則所訂亦未確也其次第為晉所亂不可復考既不以人敘又不以體分編次參差重出疊見莫能得其體例徒以源出唐人聊存舊本以備參訂焉乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:41d0d342a78b97494e84ab9eaecde722882bf40a048942e5a694031e0be68cdd
